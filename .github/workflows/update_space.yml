name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'apps/foundations/**' # Only trigger if files in this subfolder change
  workflow_dispatch: # Allows you to manually trigger the workflow from GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Sets the default execution path to your app folder for all 'run' steps
    defaults:
      run:
        working-directory: apps/foundations

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Speeds up subsequent runs by caching the packages

    - name: Install Hugging Face CLI
      run: |
        python -m pip install --upgrade pip
        python -m pip install "huggingface_hub<0.26.0"

    - name: Deploy to Spaces
      env:
        HF_TOKEN: ${{ secrets.hf_token }}
      run: |
        # 1. Authenticate with Hugging Face securely via the environment token
        huggingface-cli login --token "$HF_TOKEN"
        
        # 2. Sync all contents of 'apps/foundations' directly to your Space's root
        # Syntax: huggingface-cli upload [repo_id] [local_path] [path_in_repo] --repo-type=space
        huggingface-cli upload pnminh232/udemy-agents-foundations . . --repo-type=space